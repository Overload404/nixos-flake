# Use the "bubble" style layout from your Option 2
format = """
$status\
$character\
"""

right_format = """
${custom.ssh_bubble}\
$rust\
$lua\
$directory\
$git_branch\
$git_status\
$cmd_duration\
"""

# The main prompt symbol (ï„ )
add_newline = false

[character]
success_symbol = "[î‚¶](fg:236)[ï„  ](bg:236 fg:106)[î‚´](fg:236) " # [cite: 1, 3]
error_symbol = "[î‚¶](fg:236)[ï„  ](bg:236 fg:124)[î‚´](fg:236) "   # [cite: 1, 3]

[directory]
style = "bg:236 fg:66" # filepath_color 
format = "[î‚¶](fg:236)[$path]($style)[î‚´](fg:236) "
truncation_length = 3
fish_style_pwd_dir_length = 1

[git_branch]
symbol = "îœ¥  " # git_branch_symbol 
style = "bg:236 fg:white" 
format = "[î‚¶](fg:236)[$symbol$branch]($style)[î‚´](fg:236)"

[git_status]
# Recreates the two-tone git bubble: [branch | status]
style = "bg:236 fg:orange" # git_symbols_color 
format = "[$all_status$ahead_behind]($style)"
# Mappings from your source [cite: 1, 2]
conflicted = "[î‚¶](bg:236 fg:orange)[!|($count)](fg:236 bg:orange)[î‚´](bg:236 fg:orange)"
untracked = "[î‚¶](bg:236 fg:yellow)[َ±گ‹|($count)](fg:236 bg:yellow)[î‚´](bg:236 fg:yellow)"
modified = "[î‚¶](bg:236 fg:white)[â€¢|($count)](fg:236 bg:white)[î‚´](bg:236 fg:white)"
staged = "[î‚¶](bg:236 fg:cyan)[ïپ§|($count)](fg:236 bg:cyan)[î‚´](bg:236 fg:cyan)"
deleted = "[î‚¶](bg:236 fg:red)[ïپ¨|($count)](fg:236 bg:red)[î‚´](bg:236 fg:red)"
renamed = "[î‚¶](bg:236 fg:purple)[ï„پ|($count)](fg:236 bg:purple)][î‚´](bg:236 fg:purple)"

[status]
disabled = false
format = "[î‚¶](fg:236)[$int]($style)[î‚´](fg:236) "
style = "bg:236 fg:124" # prompt_symbol_error_color 

[custom.ssh_bubble]
# Detects SSH connection 
when = 'test -n "$SSH_CLIENT" || test -n "$SSH_TTY" || test -n "$SSH_CONNECTION"'
command = "echo ssh" # ssh_symbol [cite: 2]
style = "bg:green fg:black" # ssh_bubble_color & ssh_symbol_color 
format = "[î‚¶](fg:green)[$output]($style)[î‚´](fg:green) "

[lua]
symbol = 'î ¦ '

[rust]
symbol = 'َ±ک— '

[cmd_duration]
min_time = 0
