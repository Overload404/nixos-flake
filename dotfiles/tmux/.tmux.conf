unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-s

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key x kill-pane

#Number windows and panes starting at 1
set -g base-index 1
set -g pane-base-index 1

set-option -g status-position top
# List of plugins
set -g @plugin 'Overload404/tmux-rose-pine'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'z3z1ma/tmux-gruvbox'
set -g @gruvbox_flavour 'dark'
set -g @gruvbox_status_modules_right 'directory user host'
set -g @gruvbox_status_modules_left 'session application'
set -g @gruvbox_status_connect_separator "yes"
set -g mouse on
set-option -g @plugin 'b0o/tmux-autoreload'
